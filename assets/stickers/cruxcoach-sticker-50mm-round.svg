<?xml version="1.0" encoding="UTF-8"?>
<!--
  CruxCoach community sticker — round 50 mm with 3 mm bleed.
  Print canvas: 56 mm × 56 mm  (560 × 560 SVG units)

  Layout (top to bottom):
    1. Logo (CC + X)
    2. QR code (encodes https://cruxcoach.org, V2/M, ~20 mm, on cream rounded frame)
    3. "OPEN SOURCE"        — line 1, cream
    4. "KILTER BOARD APP"   — line 2, "KILTER BOARD" in accent orange
    5. cruxcoach.org        — URL CTA

  Trademark: "Kilter Board" used descriptively (nominative fair use).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="56mm" height="56mm"
     viewBox="0 0 560 560">

  <defs>
    <radialGradient id="gL" gradientUnits="userSpaceOnUse" cx="256" cy="256" r="210">
      <stop offset="40%" stop-color="#FF8C2A"/>
      <stop offset="100%" stop-color="#B84400"/>
    </radialGradient>
    <radialGradient id="gR" gradientUnits="userSpaceOnUse" cx="256" cy="256" r="210">
      <stop offset="40%" stop-color="#E05800"/>
      <stop offset="100%" stop-color="#8C3000"/>
    </radialGradient>
    <radialGradient id="gX" gradientUnits="userSpaceOnUse" cx="256" cy="256" r="80">
      <stop offset="0%" stop-color="#FFD080"/>
      <stop offset="100%" stop-color="#E08A00"/>
    </radialGradient>
    <g id="cclogo">
      <path d="M 252,56 A 200,200 0 1 0 248,456 L 248,384 A 128,128 0 1 1 252,128 Z" fill="url(#gL)"/>
      <path d="M 260,456 A 200,200 0 1 0 264,56 L 264,128 A 128,128 0 1 1 260,384 Z" fill="url(#gR)"/>
      <polygon points="192,214 214,192 256,234 298,192 320,214 274,256 320,298 298,320 256,278 214,320 192,298 238,256"
               fill="url(#gX)" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    </g>
  </defs>

  <rect width="560" height="560" fill="#141312"/>
  <circle cx="280" cy="280" r="230" fill="none" stroke="#2c2925" stroke-width="1.5"/>

  <use xlink:href="#cclogo" transform="translate(218.6, 60) scale(0.24)"/>

