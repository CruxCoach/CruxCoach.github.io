<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CruxCoach</title>
<meta name="theme-color" content="#141312">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<!--
  This file does double duty:

  (1) Plain 404 page for any URL that doesn't match a static file.
  (2) App-link fallback for /c/ and /l/ paths — Codeberg Pages serves
      this file as the catch-all. When the app is installed, Android
      App Links open these URLs in the app and this page never loads.
      Without the app:
        /c/<naddr>   community climb — landing view with metadata
                     fetched from Nostr relays (Kind 30078 has no
                     static representation)
        /c/<uuid>    catalogue climb — no public metadata source,
                     immediate redirect to the main site
        /l/<payload> shared playlist — immediate redirect to the
                     main site
      JS is intentionally limited to these paths (the rest of the site
      stays JS-free per README style guidelines).
-->
<style>
  :root {
    --bg: #141312;
    --bg-soft: #1f1d1a;
    --fg: #f0ede6;
    --fg-soft: #c0bcb2;
    --fg-mute: #807a70;
    --rule: #2c2925;
    --accent: #e07a4f;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--fg); background: var(--bg); -webkit-font-smoothing: antialiased; text-align: center; }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
  a:hover { border-bottom-color: var(--accent); }
  svg.logo { width: 5rem; height: 5rem; margin-bottom: 1.5rem; }
  h1 { font-size: clamp(2.2rem, 5vw, 3rem); margin: 0 0 0.4em; letter-spacing: -0.02em; }
  p { font-size: 1.1rem; color: var(--fg-soft); max-width: 32rem; margin: 0 0 1em; }
  .code { font-family: "SF Mono", Menlo, Consolas, monospace; color: var(--fg-mute); font-size: 0.9rem; margin-top: 2rem; }

  /* Climb-landing additions. Hidden by default; the inline head script
     adds the `climb-page` class to <html> before body renders, so users
     hitting /c/<naddr> never see a flash of the 404 view. */
  #default-404 { display: block; }
  #climb-landing { display: none; max-width: 38rem; }
  .climb-page #default-404 { display: none; }
  .climb-page #climb-landing { display: block; }

  #climb-landing h1 { margin-bottom: 0.2em; }
  #climb-landing .by { color: var(--fg-mute); font-size: 0.95rem; margin: 0 0 1.5rem; }
  #climb-landing .description {
    background: var(--bg-soft);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin: 1.25rem auto 1.5rem;
    text-align: left;
    white-space: pre-wrap;
    color: var(--fg);
    font-size: 1rem;
    line-height: 1.5;
  }
  #climb-landing .tags { display: inline-flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin: 0.25rem 0 2rem; }
  #climb-landing .tag { background: var(--bg-soft); color: var(--fg-soft); padding: 0.2em 0.7em; border-radius: 999px; font-size: 0.85rem; }
  .install-prompt { font-size: 1.05rem; color: var(--fg); margin: 0 0 1rem; }
  .cta-row { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin: 0.5rem 0; }
  .cta {
    display: inline-block;
    padding: 0.7em 1.3em;
    border-radius: 8px;
    border: 1px solid var(--rule);
    color: var(--fg);
    font-weight: 500;
    border-bottom: 1px solid var(--rule);
  }
  .cta:hover { border-color: var(--accent); border-bottom-color: var(--accent); }
  .cta.primary { background: var(--accent); color: #141312; border-color: var(--accent); border-bottom-color: var(--accent); }
  .cta.primary:hover { background: #d36c40; border-color: #d36c40; border-bottom-color: #d36c40; }
  [data-apk-fallback][aria-busy="true"] { cursor: progress; opacity: 0.7; }
  .small { font-size: 0.9rem; color: var(--fg-mute); margin-top: 1.75rem; max-width: 30rem; }
</style>
<script>
  // Bootstrap: route the URL before the body paints.
  // /c/<naddr> gets the climb-landing view (Nostr metadata below);
  // /c/<uuid> and /l/<payload> have nothing useful to show without the
  // app — send them straight to the main site (replace() keeps the
  // dead-end URL out of the back-button history).
  if (/^\/c\/naddr1[a-z0-9]+\/?$/i.test(location.pathname)) {
    document.documentElement.classList.add('climb-page');
  } else if (/^\/c\/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[0-9a-f]{32})\/?$/i.test(location.pathname) ||
             /^\/l\/[A-Za-z0-9_-]{5,}\/?$/.test(location.pathname)) {
    location.replace('/');
  }
</script>
</head>
<body>
  <svg class="logo" viewBox="0 0 512 512" aria-hidden="true">
    <defs>
      <radialGradient id="gL" cx="256" cy="256" r="210" gradientUnits="userSpaceOnUse"><stop offset="40%" stop-color="#FF8C2A"/><stop offset="100%" stop-color="#B84400"/></radialGradient>
      <radialGradient id="gR" cx="256" cy="256" r="210" gradientUnits="userSpaceOnUse"><stop offset="40%" stop-color="#E05800"/><stop offset="100%" stop-color="#8C3000"/></radialGradient>
      <radialGradient id="gX" cx="256" cy="256" r="80" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#FFD080"/><stop offset="100%" stop-color="#E08A00"/></radialGradient>
    </defs>
    <rect width="512" height="512" fill="#000"/>
    <path d="M252,56 A200,200 0 1 0 248,456 L248,384 A128,128 0 1 1 252,128 Z" fill="url(#gL)"/>
    <path d="M260,456 A200,200 0 1 0 264,56 L264,128 A128,128 0 1 1 260,384 Z" fill="url(#gR)"/>
    <polygon points="192,214 214,192 256,234 298,192 320,214 274,256 320,298 298,320 256,278 214,320 192,298 238,256" fill="url(#gX)"/>
  </svg>

  <div id="default-404">
    <h1>Off route.</h1>
    <p>That URL didn't match any climb on the wall. Probably an old link or a typo.</p>
    <p><a href="/">Back to the start holds →</a></p>
    <p class="small">If cruxcoach.org is ever unreachable, mirror copies are listed in <a href="/mirrors.json">/mirrors.json</a>.</p>
    <p class="code">404</p>
  </div>

  <div id="climb-landing">
    <h1 id="cl-name">…</h1>
    <p class="by" id="cl-setter" hidden></p>
    <p class="description" id="cl-description" hidden></p>
    <div class="tags" id="cl-tags" hidden></div>
    <p class="install-prompt" id="cl-install-prompt"></p>
    <div class="cta-row">
      <!-- The direct APK button keeps Codeberg as its no-JavaScript href;
           progressive enhancement switches it to the verified Zapstore
           object when Codeberg is unavailable. -->
      <a class="cta primary" id="cl-cta-zapstore" href="https://zapstore.dev/apps/com.cruxcoach.android">…</a>
      <a class="cta" id="cl-cta-releases" href="https://codeberg.org/CruxCoach/CruxCoach/releases/download/v0.2.1/CruxCoach-v0.2.1.apk" data-apk-fallback="https://cdn.zapstore.dev/fb1334ce0113ed821549b35e7480ab800d8c76d9a691b7d58da38a2a780078e4">…</a>
      <noscript><a class="cta" href="https://cdn.zapstore.dev/fb1334ce0113ed821549b35e7480ab800d8c76d9a691b7d58da38a2a780078e4">Alternate APK source</a></noscript>
    </div>
    <p class="small" id="cl-already"><span id="cl-already-text"></span> <a id="cl-cta-intent" href="">…</a></p>
  </div>

  <script>
  (function() {
    const path = location.pathname;
    const m = path.match(/^\/c\/(naddr1[a-z0-9]+)\/?$/i);
    if (!m) return;  // plain 404 stays as-is (uuid/list redirect in <head>)
    const naddr = m[1].toLowerCase();

    // ─── i18n ───────────────────────────────────────────────
    const lang = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
    document.documentElement.lang = lang;
    const i18n = {
      en: {
        loading: 'Loading climb…',
        unknown: 'CruxCoach climb',
        notFound: "Couldn't fetch this climb's metadata from public Nostr relays right now — it may be very fresh, or the relays are unreachable. The install + open-in-app links below still work.",
        by: 'by ',
        installPrompt: 'Install CruxCoach to open this climb.',
        ctaZapstore: 'Get on Zapstore',
        ctaReleases: 'Download APK',
        alreadyText: 'Already have CruxCoach installed?',
        ctaIntent: 'Open in app'
      },
      de: {
        loading: 'Lade Climb…',
        unknown: 'CruxCoach-Climb',
        notFound: 'Konnte die Climb-Metadaten gerade nicht von den öffentlichen Nostr-Relays laden — der Climb ist evtl. ganz frisch oder die Relays sind nicht erreichbar. Die Install- und In-App-Links unten funktionieren trotzdem.',
        by: 'von ',
        installPrompt: 'CruxCoach installieren, um diesen Climb zu öffnen.',
        ctaZapstore: 'Auf Zapstore holen',
        ctaReleases: 'APK herunterladen',
        alreadyText: 'CruxCoach schon installiert?',
        ctaIntent: 'In App öffnen'
      }
    };
    const t = (k) => (i18n[lang][k] != null ? i18n[lang][k] : i18n.en[k]);

    // ─── Initial paint with i18n strings + fallback content ─
    document.title = i18n[lang].unknown + ' — CruxCoach';
    const elName = document.getElementById('cl-name');
    const elSetter = document.getElementById('cl-setter');
    const elDesc = document.getElementById('cl-description');
    const elPrompt = document.getElementById('cl-install-prompt');
    const elCtaZapstore = document.getElementById('cl-cta-zapstore');
    const elCtaReleases = document.getElementById('cl-cta-releases');
    const elAlready = document.getElementById('cl-already');
    const elAlreadyText = document.getElementById('cl-already-text');
    const elCtaIntent = document.getElementById('cl-cta-intent');
    elName.textContent = t('loading');
    elPrompt.textContent = t('installPrompt');
    elCtaZapstore.textContent = t('ctaZapstore');
    elCtaReleases.textContent = t('ctaReleases');

    // intent:// only resolves on Android — package= lookup. Hide the
    // small "already installed?" line entirely on other platforms;
    // there is no equivalent cross-app launch we could trigger.
    const isAndroid = /android/i.test(navigator.userAgent || '');
    if (isAndroid) {
      const intentUrl =
        'intent://cruxcoach.org' + path + '#Intent;' +
        'scheme=https;package=com.cruxcoach.android;end';
      elCtaIntent.href = intentUrl;
      elCtaIntent.textContent = t('ctaIntent');
      elAlreadyText.textContent = t('alreadyText');
    } else {
      elAlready.hidden = true;
    }

    // ─── bech32 / NIP-19 (naddr) decode ─────────────────────
    const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
    const GEN = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];

    function polymod(values) {
      let chk = 1;
      for (const v of values) {
        const top = chk >>> 25;
        chk = ((chk & 0x1ffffff) << 5) ^ v;
        for (let i = 0; i < 5; i++) if ((top >> i) & 1) chk ^= GEN[i];
      }
      return chk;
    }
    function hrpExpand(hrp) {
      const ret = [];
      for (let i = 0; i < hrp.length; i++) ret.push(hrp.charCodeAt(i) >> 5);
      ret.push(0);
      for (let i = 0; i < hrp.length; i++) ret.push(hrp.charCodeAt(i) & 31);
      return ret;
    }
    function bech32Decode(s) {
      const lower = s.toLowerCase();
      if (s !== lower && s !== s.toUpperCase()) return null;
      const pos = lower.lastIndexOf('1');
      if (pos < 1 || pos + 7 > lower.length) return null;
      const hrp = lower.slice(0, pos);
      const data = [];
      for (let i = pos + 1; i < lower.length; i++) {
        const d = CHARSET.indexOf(lower[i]);
        if (d === -1) return null;
        data.push(d);
      }
      if (polymod(hrpExpand(hrp).concat(data)) !== 1) return null;
      return { hrp: hrp, data: data.slice(0, data.length - 6) };
    }
    function from5to8(data) {
      let acc = 0, bits = 0;
      const ret = [];
      for (const v of data) {
        if (v < 0 || (v >> 5) !== 0) return null;
        acc = (acc << 5) | v;
        bits += 5;
        while (bits >= 8) { bits -= 8; ret.push((acc >> bits) & 0xff); }
      }
      return ret;
    }
    function parseNaddr(naddr) {
      const dec = bech32Decode(naddr);
      if (!dec || dec.hrp !== 'naddr') return null;
      const bytes = from5to8(dec.data);
      if (!bytes) return null;
      let i = 0, identifier = null, author = null, kind = null;
      while (i + 1 < bytes.length) {
        const ttype = bytes[i++];
        const tlen = bytes[i++];
        if (i + tlen > bytes.length) return null;
        const v = bytes.slice(i, i + tlen);
        i += tlen;
        if (ttype === 0) identifier = String.fromCharCode.apply(null, v);
        else if (ttype === 2 && tlen === 32) author = v.map(b => b.toString(16).padStart(2, '0')).join('');
        else if (ttype === 3 && tlen === 4) kind = (v[0] << 24) | (v[1] << 16) | (v[2] << 8) | v[3];
      }
      if (!identifier || !author || kind === null) return null;
      return { identifier: identifier, author: author, kind: kind };
    }

    // ─── Render fallback "couldn't load" ────────────────────
    function renderNotFound() {
      elName.textContent = i18n[lang].unknown;
      elDesc.textContent = t('notFound');
      elDesc.removeAttribute('hidden');
    }

    const parsed = parseNaddr(naddr);
    if (!parsed || parsed.kind !== 30078) {
      renderNotFound();
      return;
    }

    // ─── Race public relays for first matching event ────────
    const RELAYS = [
      'wss://relay.damus.io',
      'wss://nos.lol',
      'wss://relay.primal.net'
    ];

    function fetchEvent(filter, timeoutMs) {
      return new Promise(function(resolve) {
        let resolved = false;
        const sockets = [];
        const subId = 'crxc' + Math.random().toString(36).slice(2, 10);
        const reqJson = JSON.stringify(['REQ', subId, filter]);
        function finish(ev) {
          if (resolved) return;
          resolved = true;
          for (const s of sockets) { try { s.close(); } catch (e) {} }
          resolve(ev);
        }
        const timer = setTimeout(function() { finish(null); }, timeoutMs);
        for (const url of RELAYS) {
          try {
            const ws = new WebSocket(url);
            sockets.push(ws);
            ws.onopen = function() { try { ws.send(reqJson); } catch (e) {} };
            ws.onmessage = function(msg) {
              try {
                const data = JSON.parse(msg.data);
                if (data[0] === 'EVENT' && data[1] === subId) {
                  clearTimeout(timer);
                  finish(data[2]);
                }
              } catch (e) {}
            };
            ws.onerror = function() { /* other relays may still reply */ };
          } catch (e) {}
        }
      });
    }

    async function load() {
      const event = await fetchEvent({
        kinds: [30078],
        authors: [parsed.author],
        '#d': [parsed.identifier],
        limit: 1
      }, 5000);
      if (!event) {
        renderNotFound();
        return;
      }
      let content = {};
      try { content = JSON.parse(event.content); } catch (e) {}
      const name = (content.name || '').trim() || i18n[lang].unknown;
      const description = (content.description || '').trim();
      elName.textContent = name;
      document.title = name + ' — CruxCoach';
      if (description) {
        elDesc.textContent = description;
        elDesc.removeAttribute('hidden');
      }

      // NIP-12 t-tags from the climb event itself — show the real ones,
      // not a static "kilterboard climbing" fallback that was misleading
      // for setters who taggged the climb differently.
      const ttags = (event.tags || [])
        .filter(function(x) { return Array.isArray(x) && x[0] === 't' && x[1]; })
        .map(function(x) { return String(x[1]); });
      if (ttags.length) {
        const elTags = document.getElementById('cl-tags');
        elTags.innerHTML = '';
        for (const tag of ttags) {
          const span = document.createElement('span');
          span.className = 'tag';
          span.textContent = '#' + tag;
          elTags.appendChild(span);
        }
        elTags.hidden = false;
      }

      // Best-effort Kind-0 lookup for setter display name. Quietly
      // skipped if no relay answers in time — the npub-short fallback
      // shows up below.
      const kind0 = await fetchEvent({
        kinds: [0],
        authors: [parsed.author],
        limit: 1
      }, 3000);
      let setterName = '';
      if (kind0) {
        try {
          const meta = JSON.parse(kind0.content);
          setterName = (meta.name || meta.display_name || '').trim();
        } catch (e) {}
      }
      if (!setterName) {
        setterName = 'npub:' + parsed.author.slice(0, 8) + '…';
      }
      elSetter.textContent = t('by') + setterName;
      elSetter.removeAttribute('hidden');
    }

    load();
  })();
  </script>

<script type="module" src="/assets/apk-download.js"></script>
<script>
/* Progressive enhancement: register the resilience service worker.
   Never blocks render; silently no-ops where unsupported. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}
</script>

</body>
</html>
